name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually publish)"
        required: false
        default: "false"
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude xtask

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: verify
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        run: |
          publish_with_retry() {
            local crate="$1"
            for attempt in 1 2 3 4 5; do
              echo "--- Publishing $crate (attempt $attempt) ---"
              local output
              output=$(cargo publish -p "$crate" 2>&1) && { echo "  Published $crate"; return 0; }
              echo "$output"
              if echo "$output" | grep -qiE "already (published|exists)"; then
                echo "  $crate already on crates.io, skipping"
                return 0
              fi
              if echo "$output" | grep -q "429"; then
                echo "  Rate limited, waiting 90s..."
                sleep 90
              else
                echo "  Failed, waiting 60s..."
                sleep 60
              fi
            done
            echo "  FAILED: $crate after 5 attempts"
            return 1
          }
          for crate in diffguard-types diffguard-diff diffguard-domain diffguard-core diffguard-analytics diffguard diffguard-lsp; do
            publish_with_retry "$crate"
            echo "  Waiting 45s for crates.io indexing..."
            sleep 45
          done

  dry-run:
    name: Dry Run
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Dry run all crates
        run: |
          for crate in diffguard-types diffguard-diff diffguard-domain diffguard-core diffguard-analytics diffguard diffguard-lsp; do
            echo "--- Dry run: $crate ---"
            cargo publish --dry-run -p "$crate"
            echo ""
          done

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Install:
            ```bash
            cargo install diffguard
            ```

            See [RELEASE-NOTES-v0.2.0.md](./RELEASE-NOTES-v0.2.0.md) for full details.
