# Pinned to SHA commits on 2026-04-27 per security hardening (work-5102a8b6).
# Review quarterly for updated action versions.
# SHA pinning ensures exactly the reviewed code runs, preventing supply chain attacks.

name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually publish)"
        required: false
        default: "false"
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude xtask

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: verify
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@1.85.0

      - name: Publish crates
        run: |
          publish_with_retry() {
            local crate="$1"
            for attempt in 1 2 3 4 5; do
              echo "--- Publishing $crate (attempt $attempt) ---"
              local output
              output=$(cargo publish -p "$crate" 2>&1) && { echo "  Published $crate"; return 0; }
              echo "$output"
              if echo "$output" | grep -qiE "already (published|exists)"; then
                echo "  $crate already on crates.io, skipping"
                return 0
              fi
              if echo "$output" | grep -q "429"; then
                echo "  Rate limited, waiting 90s..."
                sleep 90
              else
                echo "  Failed, waiting 60s..."
                sleep 60
              fi
            done
            echo "  FAILED: $crate after 5 attempts"
            return 1
          }
          for crate in diffguard-types diffguard-diff diffguard-domain diffguard-core diffguard-analytics diffguard diffguard-lsp; do
            publish_with_retry "$crate"
            echo "  Waiting 45s for crates.io indexing..."
            sleep 45
          done

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: verify
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@1.85.0

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p diffguard --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../diffguard-${{ github.ref_name }}-${{ matrix.target }}.tar.gz diffguard
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: diffguard-${{ matrix.target }}
          path: diffguard-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  dry-run:
    name: Dry Run
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@1.85.0

      - name: Dry run all crates
        run: |
          for crate in diffguard-types diffguard-diff diffguard-domain diffguard-core diffguard-analytics diffguard diffguard-lsp; do
            echo "--- Dry run: $crate ---"
            cargo publish --dry-run -p "$crate"
            echo ""
          done

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish, build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
          body: |
            ## Install

            **Homebrew:**
            ```bash
            brew install EffortlessMetrics/tap/diffguard
            ```

            **Pre-built binary (Linux x64):**
            ```bash
            curl -L https://github.com/EffortlessMetrics/diffguard/releases/latest/download/diffguard-*-x86_64-unknown-linux-gnu.tar.gz | tar xz
            sudo mv diffguard /usr/local/bin/
            ```

            **Pre-built binary (macOS Apple Silicon):**
            ```bash
            curl -L https://github.com/EffortlessMetrics/diffguard/releases/latest/download/diffguard-*-aarch64-apple-darwin.tar.gz | tar xz
            sudo mv diffguard /usr/local/bin/
            ```

            **crates.io:**
            ```bash
            cargo install diffguard
            ```

            See [RELEASE-NOTES-v0.2.0.md](./RELEASE-NOTES-v0.2.0.md) for full details.
