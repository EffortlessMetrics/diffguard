name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually publish)"
        required: false
        default: "false"
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude xtask

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: verify
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish diffguard-types
        run: cargo publish -p diffguard-types
      - name: Wait for indexing
        run: sleep 30

      - name: Publish diffguard-diff
        run: cargo publish -p diffguard-diff
      - name: Wait for indexing
        run: sleep 30

      - name: Publish diffguard-domain
        run: cargo publish -p diffguard-domain
      - name: Wait for indexing
        run: sleep 30

      - name: Publish diffguard-core
        run: cargo publish -p diffguard-core
      - name: Wait for indexing
        run: sleep 30

      - name: Publish diffguard-analytics
        run: cargo publish -p diffguard-analytics
      - name: Wait for indexing
        run: sleep 30

      - name: Publish diffguard (CLI)
        run: cargo publish -p diffguard
      - name: Wait for indexing
        run: sleep 30

      - name: Publish diffguard-lsp
        run: cargo publish -p diffguard-lsp

  dry-run:
    name: Dry Run
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Dry run all crates
        run: |
          for crate in diffguard-types diffguard-diff diffguard-domain diffguard-core diffguard-analytics diffguard diffguard-lsp; do
            echo "--- Dry run: $crate ---"
            cargo publish --dry-run -p "$crate"
            echo ""
          done

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Install:
            ```bash
            cargo install diffguard
            ```

            See [RELEASE-NOTES-v0.2.0.md](./RELEASE-NOTES-v0.2.0.md) for full details.
