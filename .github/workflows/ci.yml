# Pinned to SHA commits on 2026-04-27 per security hardening (work-5102a8b6).
# Review quarterly for updated action versions.
# SHA pinning ensures exactly the reviewed code runs, preventing supply chain attacks.

name: ci

on:
  pull_request:
  push:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - run: cargo test --workspace

  xtask:
    name: xtask ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - run: cargo run -p xtask -- ci

  # Gate validation: issue linkage
  gate-linked:
    name: "Gate: Issue linked"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Check PR body references an issue
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "$PR_BODY" > /tmp/pr-body.txt
          # Allow chore/ branches (maintenance, no issue needed)
          if echo "$BRANCH" | grep -qE '^chore/'; then
            echo "✅ chore/ branch — issue link waived for maintenance PRs"
            exit 0
          fi
          if grep -qiE '(closes|fixes|resolves)(\s+#[0-9]+|\s+https?://[^/]+/[^/]+/issues/[0-9]+)' /tmp/pr-body.txt; then
            echo "✅ PR references an issue"
          else
            echo "❌ PR does not reference an issue"
            echo ""
            echo "Add 'Closes #N' to the PR body to link your issue."
            exit 1
          fi

  # Gate validation: branch naming
  gate-branch:
    name: "Gate: Branch convention"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Check branch name follows convention
        run: |
          BRANCH="${{ github.head_ref }}"
          if echo "$BRANCH" | grep -qE '^(feat|fix|chore|docs|refactor|test)/[0-9]+-'; then
            echo "✅ Branch '$BRANCH' follows convention"
          else
            echo "⚠️  Branch '$BRANCH' doesn't follow naming convention"
            echo "Expected: <type>/<issue-number>-<slug>"
            echo "Examples: feat/11-fix-include-recursion, fix/12-defaults-merge"
            echo ""
            echo "This is a warning, not a failure."
          fi
